<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCS Mediator Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#555;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--teal:#14b8a6;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--green)}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:var(--green);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:500}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar-right{display:flex;align-items:center;gap:10px}
.last-updated{font-size:12px;color:var(--text3)}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--bg4)}
.btn-green{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.35);color:var(--green)}
.btn-green:hover{background:rgba(34,197,94,0.25)}

.main{padding:24px 28px;max-width:1400px;margin:0 auto}

.load-bar-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px}
.load-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.load-bar-label{font-size:13px;color:var(--text2)}
.load-bar-pct{font-size:13px;font-weight:600;color:var(--green)}
.load-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:8px}
.load-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.5s ease}
.load-months{display:flex;gap:8px;flex-wrap:wrap}
.load-month-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text3)}
.load-month-pill.loading{border-color:rgba(245,158,11,0.4);color:var(--amber);background:rgba(245,158,11,0.07)}
.load-month-pill.done{border-color:rgba(34,197,94,0.4);color:var(--green);background:rgba(34,197,94,0.07)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.pill-spin{width:10px;height:10px;border:1.5px solid var(--amber);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red);border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;line-height:1.9}

.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px}
.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.section-sub{font-size:12px;color:var(--text3);font-weight:400}

.top5-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.top5-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:border-color 0.3s}
.top5-card.r1{border-color:rgba(245,158,11,0.5)}
.top5-card.r2{border-color:rgba(180,180,180,0.3)}
.top5-card.r3{border-color:rgba(180,120,80,0.35)}
.top5-rank{position:absolute;top:12px;right:12px;font-size:22px;line-height:1}
.top5-code{font-family:'SF Mono','Fira Code',monospace;font-size:11px;font-weight:700;color:var(--teal);margin-bottom:8px;word-break:break-all;padding-right:28px}
.top5-num{font-size:34px;font-weight:800;line-height:1;margin-bottom:3px}
.top5-sub{font-size:11px;color:var(--text3);margin-bottom:10px}
.top5-months{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.top5-m{font-size:10px;color:var(--text3)}.top5-m b{color:var(--text2);font-weight:600}
.tier-badge{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:99px;font-size:10px;font-weight:600}

.legend{display:flex;flex-wrap:wrap;gap:12px}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.lsq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative;width:100%;height:300px}

.tier-key{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tier-key-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 12px}
.tier-dot{width:8px;height:8px;border-radius:50%}

.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.filter-row input{width:200px}
.filter-row input:focus,.filter-row select:focus{border-color:rgba(34,197,94,0.4)}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap}
.mtab{padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer}
.mtab.active{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.35);color:var(--green)}
.result-count{font-size:12px;color:var(--text3)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody td{padding:10px 13px;font-size:13px;vertical-align:middle}
.rb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text2)}
.rb1{background:rgba(245,158,11,0.2);color:#f59e0b}
.rb2{background:rgba(180,180,180,0.12);color:#9ca3af}
.rb3{background:rgba(180,120,80,0.2);color:#b47850}
.code{font-family:'SF Mono','Fira Code',monospace;font-size:12px;font-weight:600;color:var(--teal)}
.nc{text-align:center}.nz{color:var(--text3)}
.cur-badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.cur-zero{background:var(--bg3);color:var(--text3);border-color:var(--border)}
.bar-wrap{display:flex;align-items:center;gap:7px}
.bar-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px}
.bar-pct{font-size:11px;color:var(--text2);min-width:28px;text-align:right}
.fw{font-weight:700}

/* tier classes set dynamically */
.t-elite{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.25)}
.t-prime{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.t-standard{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.t-active{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.t-passive{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.18)}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px}
@media(max-width:600px){.main{padding:14px 12px}.topbar{padding:12px 16px}}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">MCS <span>Media</span></div>
    <div class="live-pill"><span class="live-dot"></span>Live</div>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="btn btn-green" onclick="initDashboard()">↻ Refresh</button>
  </div>
</div>

<div class="main">

  <div class="load-bar-wrap" id="load-bar-wrap">
    <div class="load-bar-top">
      <span class="load-bar-label" id="load-label">Connecting…</span>
      <span class="load-bar-pct" id="load-pct">0%</span>
    </div>
    <div class="load-bar-track"><div class="load-bar-fill" id="load-fill" style="width:0%"></div></div>
    <div class="load-months" id="load-months"></div>
  </div>

  <div id="error-area"></div>

  <div id="top5-card" class="section-card" style="display:none">
    <div class="section-title" id="top5-title">Top 5 mediators <span class="section-sub" id="top5-sub"></span></div>
    <div class="top5-grid" id="top5-grid"></div>
  </div>

  <div id="chart-card" class="section-card" style="display:none">
    <div class="section-title">
      <span>Monthly breakdown — top 10</span>
      <div class="legend" id="chart-legend"></div>
    </div>
    <div class="chart-wrap">
      <canvas id="barChart" role="img" aria-label="Monthly orders for top 15 mediators">Monthly order counts.</canvas>
    </div>
  </div>

  <div id="table-card" class="section-card" style="display:none">
    <div class="section-title">
      <span>All mediators</span>
      <div class="month-tabs" id="month-tabs"></div>
    </div>
    <div class="tier-key" id="tier-key"></div>
    <div class="filter-row">
      <input type="text" id="search-box" placeholder="Search MCS code…" oninput="applyFilters()">
      <select id="tier-filter" onchange="applyFilters()">
        <option value="">All tiers</option>
        <option value="Elite">Elite</option>
        <option value="Prime">Prime</option>
        <option value="Standard">Standard</option>
        <option value="Active">Active</option>
        <option value="Passive">Passive</option>
      </select>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footer">MCS Media · Mediator Dashboard · Auto-refreshes daily at midnight · <span id="footer-date"></span></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2RG5g5dSgIfA-_hX7jfjPNdM8qfcG65hT_xHRcqbEZfnjgFZLIBcFh-TZ-21Vy0HwMw/exec';

// Codes to exclude — any MCS code matching these patterns
const EXCLUDE_PATTERN = /^MCSIN\d/i;

const MCS_CODES = [
  'MCSSUNIL','MCSRAJ','MCSPIYUSH','MCSAVNI','MCSHIM','MCSMANSI','MCSABV',
  'MCSSHIVANI','MCSPRINCE','MCSFTS','MCSHIMANSHI','MCSTDC','MCSYASHVI','MCSBHAVISHA',
  'MCSLVL','MCSNHIL','MCSSURAT','MCSSAAD','MCSSAPNA','MCSAMAAN','MCSMONTY','MCSKEESHA',
  'MCSRUDRA','MCSNITU','MCSUMA','MCSDEV','MCSSHEF','MCSTANU','MCSSOM','MCSAPK','MCSMIT',
  'MCSARP','MCSMONI','MCSNABOMITA','MCSCHARCHIT','MCSSUMIT','MCSSINANJU','MCSDHRUV',
  'MCSAAYUSH','MCSINANJU','MCSINELMA','MCSSALONI','MCSLAV','MCSRAD','MCSJATIN',
  'MCSPRANJUL','MCSANJALI','MCSVAISHNAVI','MCSVINITA','MCSBANALI','MCSERAM','MCSSHREYA',
  'MCSURVASHI','MCSTAN','MCSSWATI','MCSDAKSH','MCSMEGHAL','MCSARCHI','MCSGAURAV',
  'MCSJAIN','MCSBDX','MCSTEAM','MCSHUNNY','MCSAISHA','MCSKHUSHAL',
  'MCSVAISHALI','MCSPOOJA','MCSDIVYA','MCSSHIKHA','MCSKARISHMA','MCSADDA','MCSLAVA',
  'MCSTANISHA','MCSRITESH','MCSMEGHA','MCSAJ','MCSREV','MCSKAPOOR','MCSNANDINI',
  'MCSVIBHU','MCSSHIVAM','MCSMOKSH','MCSANU','MCSXNIDHI','MCSBUNNY','MCSSTARS','MCSABHISHEK','MCSANJU','MCSLOKESH','MCSJAHNVI',
].filter(c => !EXCLUDE_PATTERN.test(c));

// ── Tier thresholds (total across shown months) ──
// Elite ≥ 600 · Prime ≥ 300 · Standard ≥ 100 · Active ≥ 20 · Passive < 20
const TIERS = [
  { label:'Elite',    min:600, cls:'t-elite', dot:'#a78bfa' },
  { label:'Prime',    min:300, cls:'t-prime', dot:'#22c55e' },
  { label:'Standard', min:100, cls:'t-standard', dot:'#60a5fa' },
  { label:'Active',   min:20,  cls:'t-active', dot:'#f59e0b' },
  { label:'Passive',  min:0,   cls:'t-passive', dot:'#ef4444' },
];

function getTier(total) {
  for (const t of TIERS) if (total >= t.min) return t;
  return TIERS[TIERS.length - 1];
}

// ── Build dynamic months: current + last 2 ──
function buildMonths() {
  const now    = new Date();
  const months = [];
  const NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const COLORS = ['#3b82f6','#14b8a6','#f59e0b','#22c55e','#a78bfa','#f472b6','#34d399','#fb923c','#38bdf8','#a3e635','#f87171','#818cf8'];
  for (let i = 2; i >= 0; i--) {
    const d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = 'm' + d.getFullYear() + '_' + (d.getMonth() + 1);
    months.push({
      key,
      label:    NAMES[d.getMonth()] + ' ' + d.getFullYear(),
      short:    NAMES[d.getMonth()],
      from:     d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      to:       d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      num:      d.getMonth() + 1,
      year:     d.getFullYear(),
      isCurrent: i === 0,
      color:    COLORS[d.getMonth()],
    });
  }
  return months;
}

const MONTHS = buildMonths();
// Sort MCS_CODES longest-first so specific codes match before shorter ones
// e.g. MCSVAISHNAVIPAID matches MCSVAISHNAVI not a shorter prefix
MCS_CODES.sort((a, b) => b.length - a.length);
const CURRENT_MONTH = MONTHS[MONTHS.length - 1];

let allRows = [];
let sortKey = 'total';
let chartInst = null;
let loadedMonths = {};

// ── Progress UI ──
function initLoadUI() {
  const pills = document.getElementById('load-months');
  pills.innerHTML = MONTHS.map(m => `
    <div class="load-month-pill" id="pill-${m.key}">
      <span class="pill-dot"></span>${m.label}
    </div>`).join('');
}

function setPillState(key, state) {
  const pill = document.getElementById('pill-' + key);
  if (!pill) return;
  pill.className = 'load-month-pill ' + state;
  if (state === 'loading') {
    pill.innerHTML = `<span class="pill-spin"></span>${MONTHS.find(m=>m.key===key).label}`;
  } else if (state === 'done') {
    pill.innerHTML = `<span class="pill-dot"></span>${MONTHS.find(m=>m.key===key).label} ✓`;
  }
}

function setLoadBar(pct, label) {
  document.getElementById('load-fill').style.width = pct + '%';
  document.getElementById('load-pct').textContent  = Math.round(pct) + '%';
  document.getElementById('load-label').textContent = label;
}

// ── Build table headers dynamically ──
function buildTableHeaders() {
  const tabsEl = document.getElementById('month-tabs');
  tabsEl.innerHTML = `<div class="mtab active" onclick="setSort('total',this)">Total</div>` +
    MONTHS.map(m => `<div class="mtab" onclick="setSort('${m.key}',this)">${m.short}</div>`).join('');

  document.getElementById('thead-row').innerHTML =
    `<th style="width:40px">#</th>
     <th>MCS code</th>` +
    MONTHS.map(m => `<th class="nc" style="width:72px">${m.short}${m.isCurrent ? ' <span style="color:var(--green);font-size:9px">(live)</span>' : ''}</th>`).join('') +
    `<th class="nc" style="width:68px">Total</th>
     <th style="min-width:110px">Share</th>
     <th style="width:86px">Tier</th>`;
}

function buildTierKey() {
  document.getElementById('tier-key').innerHTML = TIERS.map(t =>
    `<div class="tier-key-item"><div class="tier-dot" style="background:${t.dot}"></div>${t.label} ${t === TIERS[TIERS.length-1] ? '< '+TIERS[TIERS.length-2].min : t.min === TIERS[0].min ? '≥ '+t.min : t.min+'–'+(TIERS[TIERS.indexOf(t)-1].min-1)}</div>`
  ).join('');
}

// ── Fetch ──
async function fetchAllMonths() {
  // Single API call covering the full date range of all 3 months
  const from = MONTHS[0].from;
  const to   = MONTHS[MONTHS.length - 1].to;
  const url  = SCRIPT_URL + '?action=dashGetAllOrders&fromDate=' + from + '&toDate=' + to;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data.orders || [];
}

// ── Main ──
async function initDashboard() {
  allRows       = [];
  loadedMonths  = {};
  document.getElementById('error-area').innerHTML = '';
  document.getElementById('load-bar-wrap').style.display = 'block';
  document.getElementById('top5-card').style.display     = 'none';
  document.getElementById('chart-card').style.display    = 'none';
  document.getElementById('table-card').style.display    = 'none';
  document.getElementById('last-updated').textContent    = 'Loading…';

  initLoadUI();
  buildTableHeaders();
  buildTierKey();

  const counts = {};
  MCS_CODES.forEach(c => {
    counts[c] = {};
    MONTHS.forEach(m => counts[c][m.key] = 0);
  });

  // Single API call for all 3 months at once
  MONTHS.forEach(m => setPillState(m.key, 'loading'));
  setLoadBar(10, 'Fetching all data in one call…');

  try {
    const orders = await fetchAllMonths();
    setLoadBar(70, 'Processing ' + orders.length + ' orders…');

    orders.forEach(o => {
      const raw = (o.mcsCode || '').trim().toUpperCase();
      if (EXCLUDE_PATTERN.test(raw)) return;
      const parent = MCS_CODES.find(c => raw === c || raw.startsWith(c));
      if (!parent) return;
      // Determine which month bucket this order belongs to
      const monthNum = o.month; // month number returned by script
      const orderYear = o.year || new Date().getFullYear();
      const bucket   = MONTHS.find(m => m.num === monthNum && m.year === orderYear);
      if (!bucket) return;
      counts[parent][bucket.key] = (counts[parent][bucket.key] || 0) + 1;
    });

    MONTHS.forEach(m => { loadedMonths[m.key] = true; setPillState(m.key, 'done'); });
    setLoadBar(90, 'Rendering…');
  } catch(err) {
    document.getElementById('error-area').innerHTML =
      '<div class="error-box">⚠️ Failed to load data: <b>' + err.message + '</b><br>' +
      'Make sure <code>dashGetAllOrders</code> is in your <code>doGet</code> and deployment is set to <b>Anyone</b>.</div>';
    document.getElementById('load-bar-wrap').style.display = 'none';
    return;
  }

  allRows = Object.entries(counts).map(([code, m]) => {
    const row = { code };
    let total = 0;
    MONTHS.forEach(mo => { row[mo.key] = m[mo.key] || 0; total += row[mo.key]; });
    row.total = total;
    return row;
  }).sort((a, b) => b.total - a.total);

  document.getElementById('top5-card').style.display  = 'block';
  document.getElementById('chart-card').style.display = 'block';
  document.getElementById('table-card').style.display = 'block';
  renderTop5();
  renderChart();
  applyFilters();
  setLoadBar(100, 'All data loaded ✓');

  

  document.getElementById('load-bar-wrap').style.display = 'none';
  const now = new Date();
  document.getElementById('last-updated').textContent = 'Updated ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('footer-date').textContent  = now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  scheduleAutoRefresh();
}

// ── Render top 5 ──
function renderTop5() {
  const sub  = MONTHS.map(m=>m.label).join(', ');
  document.getElementById('top5-sub').textContent = '· ' + sub;
  const top5  = allRows.filter(r=>r.total>0).slice(0,5);
  const emojis= ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const rcls  = ['r1','r2','r3','',''];
  document.getElementById('top5-grid').innerHTML = top5.map((r,i)=>{
    const t = getTier(r.total);
    return `<div class="top5-card ${rcls[i]}">
      <div class="top5-rank">${emojis[i]}</div>
      <div class="top5-code">${r.code}</div>
      <div class="top5-num">${r.total}</div>
      <div class="top5-sub">total orders</div>
      <div class="top5-months">
        ${MONTHS.map(m=>`<div class="top5-m">${m.short} <b>${r[m.key]}</b></div>`).join('')}
      </div>
      <span class="tier-badge ${t.cls}">${t.label}</span>
    </div>`;
  }).join('');
}

// ── Render chart ──
function renderChart() {
  const active   = allRows.filter(r=>r.total>0).slice(0,10);
  const labels   = active.map(r=>r.code.replace('MCS',''));
  const datasets = MONTHS.map(m=>({
    label: m.label,
    data: active.map(r=>r[m.key]),
    backgroundColor: m.color,
    borderRadius: 3,
    borderWidth: 0,
  }));
  document.getElementById('chart-legend').innerHTML = MONTHS.map(m=>
    `<div class="li"><div class="lsq" style="background:${m.color}"></div>${m.label}</div>`
  ).join('');
  if (chartInst) { chartInst.destroy(); chartInst=null; }
  chartInst = new Chart(document.getElementById('barChart'),{
    type:'bar', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a1a',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#f0f0f0',bodyColor:'#a0a0a0',padding:10}},
      scales:{
        x:{ticks:{color:'#666',font:{size:10},autoSkip:false,maxRotation:40},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{beginAtZero:true,ticks:{color:'#666',font:{size:11}},grid:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });
}

// ── Render table ──
function renderTable(rows) {
  const grand = rows.reduce((s,r)=>s+r.total,0)||1;
  const maxT  = Math.max(...rows.map(r=>r.total),1);
  const rbcls = ['rb1','rb2','rb3'];
  document.getElementById('tbody').innerHTML = rows.map((r,i)=>{
    const pct  = Math.round((r.total/grand)*100);
    const barW = Math.round((r.total/maxT)*100);
    const t    = getTier(r.total);
    const barC = t.dot;
    const rc   = rbcls[i]||'';
    const cell = v => v>0 ? `<td class="nc">${v}</td>` : `<td class="nc nz">—</td>`;
    const curKey = CURRENT_MONTH.key;
    const curV   = r[curKey];
    const curCell = `<td class="nc"><span class="${curV>0?'cur-badge':'cur-badge cur-zero'}">${curV>0?curV:'—'}</span></td>`;
    const monthCells = MONTHS.map(m =>
      m.isCurrent ? curCell : cell(r[m.key])
    ).join('');
    return `<tr>
      <td><span class="rb ${rc}">${i+1}</span></td>
      <td><span class="code">${r.code}</span></td>
      ${monthCells}
      <td class="nc fw">${r.total||'—'}</td>
      <td><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${barC}"></div></div><span class="bar-pct">${pct}%</span></div></td>
      <td><span class="tier-badge ${t.cls}">${t.label}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('result-count').textContent = rows.length + ' mediators';
}

function setSort(key, el) {
  sortKey = key;
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q  = (document.getElementById('search-box').value||'').trim().toLowerCase();
  const tf = document.getElementById('tier-filter').value;
  let rows = [...allRows].sort((a,b)=>b[sortKey]-a[sortKey]);
  if (q)  rows = rows.filter(r=>r.code.toLowerCase().includes(q));
  if (tf) rows = rows.filter(r=>getTier(r.total).label===tf);
  renderTable(rows);
}

function scheduleAutoRefresh() {
  const now = new Date();
  const mid = new Date(now);
  mid.setDate(mid.getDate()+1);
  mid.setHours(0,0,0,0);
  setTimeout(()=>initDashboard(), mid-now);
}

initDashboard();
</script>
</body>
</html>
